name: Build Windows Portable EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  build-windows:
    name: Build portable Windows package
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -e . pyinstaller pytest

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: .\.venv\Scripts\python.exe -m pytest

      - name: Build portable Windows package
        run: .\build_gfs_portable.bat

      - name: Verify executables
        shell: pwsh
        run: |
          if (!(Test-Path "dist/GFS/GFS.exe")) {
            throw "dist/GFS/GFS.exe was not created"
          }
          if (!(Test-Path "dist/GFS/GFS_Emulator.exe")) {
            throw "dist/GFS/GFS_Emulator.exe was not created"
          }
          Get-ChildItem "dist" | Format-Table Name, Length

      - name: Upload portable package
        uses: actions/upload-artifact@v4
        with:
          name: GFS-windows-portable
          path: dist/GFS_portable_*.zip
          if-no-files-found: error
